<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 3rem;
      animation: fadeIn 2s ease-in;
    }

    .heart {
      font-size: 5rem;
      animation: beat 1.2s ease-in-out infinite;
      display: inline-block;
      margin-bottom: 2rem;
    }

    .message {
      color: #fff;
      font-size: 1.5rem;
      line-height: 2.2;
      max-width: 600px;
      margin: 0 auto;
      opacity: 0;
      animation: slideUp 1.5s ease-out 0.5s forwards;
    }

    .signature {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.1rem;
      margin-top: 3rem;
      font-style: italic;
      opacity: 0;
      animation: slideUp 1.5s ease-out 1.5s forwards;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.15); }
      30% { transform: scale(1); }
      45% { transform: scale(1.1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .floating-hearts {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: -1;
    }

    .floating-heart {
      position: absolute;
      bottom: -10%;
      font-size: 1.5rem;
      opacity: 0.3;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
      100% { transform: translateY(-110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="floating-hearts" id="hearts"></div>

  <div class="container">
    <div class="heart">❤️</div>
    <div class="message">
      Hey Tejan, just wanted you to know —<br>
      you're the best thing that ever happened to me.<br>
      I love you more than words can say.<br>
      Can't wait to spend the rest of my life with you.
    </div>
    <div class="signature">— Forever yours ❤️</div>
  </div>

  <script>
    const container = document.getElementById('hearts');
    const heartEmojis = ['❤️', '💕', '💖', '💗', '💓', '🤍'];

    function createHeart() {
      const heart = document.createElement('span');
      heart.className = 'floating-heart';
      heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
      heart.style.animationDuration = (Math.random() * 5 + 6) + 's';
      heart.style.animationDelay = Math.random() * 2 + 's';
      container.appendChild(heart);
      setTimeout(() => heart.remove(), 12000);
    }

    setInterval(createHeart, 800);
    for (let i = 0; i < 8; i++) createHeart();
  </script>
</body>
</html>
